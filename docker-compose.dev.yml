# Local development: Postgres + API with hot reload.
#
# Usage:
#   cp .env.docker.example .env
#   docker compose -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.dev.yml run --rm api npx prisma migrate deploy
#   docker compose -f docker-compose.dev.yml run --rm api npm run prisma:seed

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-auth_basic}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-auth_basic}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-auth_basic}?schema=public
      NODE_ENV: development
    env_file:
      - path: .env
        required: false
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules

volumes:
  pgdata:
  api_node_modules:
